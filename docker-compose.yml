services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: koin
      POSTGRES_USER: koin
      POSTGRES_PASSWORD: koin
    volumes:
      - koin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koin -d koin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  koin_postgres_data:
